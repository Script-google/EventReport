
<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>แบบฟอร์มลงทะเบียนใบอนุญาต</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Prompt', sans-serif;
      background: linear-gradient(135deg, #d0f4de, #c2f0c2, #a8e6cf);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: start;
      min-height: 100vh;
    }

    .container {
      background-color: #ffffffcc;
      backdrop-filter: blur(8px);
      margin-top: 3rem;
      max-width: 650px;
      width: 90%;
      padding: 2rem;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
    }

    .logo-container {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .logo-container img {
      max-width: 120px;
      border-radius: 12px;
    }

    h1 {
      text-align: center;
      color: #2e7d32;
      font-size: 1.8rem;
      margin-bottom: 1.5rem;
    }

    label {
      font-weight: 600;
      color: #33691e;
      display: block;
      margin: 1rem 0 0.5rem;
    }

    input, select {
      width: 100%;
      padding: 0.7rem;
      border: 1px solid #ccc;
      border-radius: 12px;
      background-color: #fdfdfd;
      font-size: 1rem;
    }

    input[type="file"] {
      background-color: #f3f3f3;
    }

    button {
      background-color: #81c784;
      color: #ffffff;
      padding: 0.8rem 1.5rem;
      margin-top: 1.5rem;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      font-size: 1rem;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #66bb6a;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <img src="https://img2.pic.in.th/pic/LOGO1aefd6d4ebc64e51.png" alt="">
    </div>
    <h1>แบบฟอร์มลงทะเบียนใบอนุญาต</h1>
    <form id="customForm" action="https://docs.google.com/forms/d/e/1FAIpQLSdFr4GYpdZWg79a2wiN9mstmIBjhiFBb43sh4KTbFAO2TZ2uw/formResponse" method="POST" target="hidden_iframe" onsubmit="submitted=true">
      
      <label for="license-number">เลขที่ใบอนุญาต</label>
      <input type="text" name="entry.1111111111" id="license-number" required>

      <label for="company-name">ชื่อกิจการ/บริษัท</label>
      <input type="number" name="entry.2222222222" id="company-name" required>

      <label for="address">ที่ตั้งเลขที่</label>
      <input type="text" name="entry.3333333333" id="address" required>

      <label for="phone">เบอร์โทรศัพท์</label>
      <input type="number" name="entry.4444444444" id="phone" required>

      <label for="license-type">ประเภทใบอนุญาต</label>
      <select name="entry.5555555555" id="license-type" required>
        <option value="">-- กรุณาเลือก --</option>
        <option value="ใบอนุญาตกิจการที่เป็นอันตรายต่อสุขภาพ">ใบอนุญาตกิจการที่เป็นอันตรายต่อสุขภาพ</option>
        <option value="หนังสือรับรองการแจ้งจัดตั้งสถานที่จำหน่ายอาหาร">หนังสือรับรองการแจ้งจัดตั้งสถานที่จำหน่ายอาหาร</option>
        <option value="ใบอนุญาตประกอบกิจการรับทำการเก็บ ขน หรือกำจัดสิ่งปฏิกูลหรือมูลฝอย">ใบอนุญาตประกอบกิจการรับทำการเก็บ ขน หรือกำจัดสิ่งปฏิกูลหรือมูลฝอย</option>
        <option value="ใบอนุญาตกิจการจัดตั้งสถานที่จำหน่ายอาหาร เกิน ๒๐๐ ตรม.">ใบอนุญาตกิจการจัดตั้งสถานที่จำหน่ายอาหาร เกิน ๒๐๐ ตรม.</option>
        <option value="ใบอนุญาตจัดตั้งสถานที่จำหน่ายอาหาร">ใบอนุญาตจัดตั้งสถานที่จำหน่ายอาหาร</option>
        <option value="ใบอนุญาตจัดตั้งสถานที่สะสมอาหาร">ใบอนุญาตจัดตั้งสถานที่สะสมอาหาร</option>
      </select>

      <label for="issue-date">วัน/เดือน/ปี ที่ออก</label>
      <input type="date" name="entry.6666666666" id="issue-date" required>

      <label for="expiry-date">วัน/เดือน/ปี ที่หมดอายุ</label>
      <input type="date" name="entry.7777777777" id="expiry-date" required>

      <label for="file-upload">ไฟล์เอกสาร</label>
      <input type="file" id="file-upload" disabled title="ฟีเจอร์นี้รองรับเฉพาะใน Google Form เท่านั้น">

      <button type="submit">ส่งข้อมูล</button>
    </form>

    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted) { document.getElementById('customForm').reset(); alert('ส่งข้อมูลเรียบร้อยแล้ว'); }"></iframe>
  </div>

  <script>
    let submitted = false;
  </script>
</body>
</html>
